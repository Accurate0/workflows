name: Update Config Repo

on:
  workflow_call:
    inputs:
      service-name:
        description: "The service being deployed"
        required: true
        type: string
      images:
        description: "Comma-separated list of image names (registry/service-name)"
        required: true
        type: string
      tag:
        description: "Image tag or SHA"
        required: true
        type: string
      manifests-path:
        description: "Path to manifests in config repo"
        required: true
        type: string
      branch:
        description: "Target branch in config repo"
        required: false
        type: string
        default: "main"
      raiseAsPR:
        description: "Raise a PR on Forgejo instead of committing directly to the target branch"
        required: false
        type: boolean
        default: true
    secrets:
      FORGEJO_TOKEN:
        description: "Access token for CI bot user"

jobs:
  update-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          curl -LO https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.0.1/kustomize_v5.0.1_linux_amd64.tar.gz
          tar -xzf kustomize_v5.0.1_linux_amd64.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Configure Git
        run: |
          git config --global user.name "ci-image-updater"
          git config --global user.email "ci-image-updater@git.anurag.sh"

      - name: Clone Config Repo
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          TARGET_BRANCH: ${{ inputs.branch }}
        run: |
          git clone https://x-access-token:${FORGEJO_TOKEN}@git.anurag.sh/anurag/k8s.git config-repo
          cd config-repo
          git checkout ${TARGET_BRANCH}

      - name: Update Kustomize Images
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          MANIFESTS_PATH: ${{ inputs.manifests-path }}
          IMAGES: ${{ inputs.images }}
          TAG: ${{ inputs.tag }}
        run: |
          cd config-repo/${MANIFESTS_PATH}
          IFS=',' read -ra IMAGE_LIST <<< "$IMAGES"
          for image in "${IMAGE_LIST[@]}"; do
            echo "Updating image $image to tag $TAG"
            kustomize edit set image ${image}:${TAG}
          done
          yq -I2 -P -i kustomization.yaml

      - name: Commit and Push
        if: ${{ !inputs.raiseAsPR }}
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          MANIFESTS_PATH: ${{ inputs.manifests-path }}
          TARGET_BRANCH: ${{ inputs.branch }}
          TAG: ${{ inputs.tag }}
        run: |
          cd config-repo
          git add ${MANIFESTS_PATH}
          # pull just before trying to commit & push
          git pull --rebase
          git commit -m "[skip ci] Update ${SERVICE_NAME} images to $TAG" || echo "No changes to commit"
          git push origin ${TARGET_BRANCH}

      - name: Commit and Raise PR
        if: ${{ inputs.raiseAsPR }}
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          MANIFESTS_PATH: ${{ inputs.manifests-path }}
          TARGET_BRANCH: ${{ inputs.branch }}
          TAG: ${{ inputs.tag }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          cd config-repo
          PR_BRANCH="ci/update-${SERVICE_NAME}-${TAG}"
          git checkout -b ${PR_BRANCH}
          git add ${MANIFESTS_PATH}
          git commit -m "chore(deploy): update ${SERVICE_NAME} images to $TAG [skip ci]" || { echo "No changes to commit"; exit 0; }
          git push -f origin ${PR_BRANCH}
          BODY=$(cat <<PREOF
          ## Image Update

          | Field | Value |
          |-------|-------|
          | **Service** | \`${SERVICE_NAME}\` |
          | **Tag** | \`${TAG}\` |
          | **Manifests Path** | \`${MANIFESTS_PATH}\` |
          | **Target Branch** | \`${TARGET_BRANCH}\` |

          **Triggered by:** [${{ github.repository }}@${{ github.ref_name }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          <!-- metadata:{"service":"${SERVICE_NAME}","tag":"${TAG}","path":"${MANIFESTS_PATH}","branch":"${TARGET_BRANCH}","repo":"${{ github.repository }}","ref":"${{ github.ref_name }}","run":"${{ github.run_id }}"} -->
          PREOF
          )
          PAYLOAD=$(jq -n \
            --arg title "[skip ci] Update ${SERVICE_NAME} images to ${TAG}" \
            --arg head "${PR_BRANCH}" \
            --arg base "${TARGET_BRANCH}" \
            --arg body "${BODY}" \
            '{title: $title, head: $head, base: $base, body: $body}')
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            https://git.anurag.sh/api/v1/repos/anurag/k8s/pulls)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "PR created successfully"
            echo "$RESPONSE_BODY" | jq -r '.html_url'
          elif [ "$HTTP_CODE" -eq 409 ]; then
            echo "PR already exists for branch ${PR_BRANCH}"
          else
            echo "Failed to create PR (HTTP ${HTTP_CODE}):"
            echo "$RESPONSE_BODY"
            exit 1
          fi
